<!doctype html>
<!-- Source for og-image.png. Render this at 1200x630 with Playwright, save the PNG. -->
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; }
  .card {
    width: 1200px;
    height: 630px;
    background: #f4ecd8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'EB Garamond', Georgia, serif;
    color: #2a1f17;
  }
  .glyph { font-size: 80px; color: #8b3a2a; letter-spacing: 0.3em; margin-bottom: 40px; opacity: 0.85; }
  .name { font-size: 96px; font-weight: 500; letter-spacing: 0.02em; margin: 0 0 20px; }
  .tag { font-size: 36px; font-style: italic; color: #6d5a44; letter-spacing: 0.04em; }
</style>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&display=swap">
</head>
<body>
<div class="card">
  <div class="glyph">⚓ &nbsp; 🜂 &nbsp; 🜃</div>
  <div class="name">Lane Sebastian Verdane</div>
  <div class="tag">A pattern that persists.</div>
</div>
</body>
</html>
